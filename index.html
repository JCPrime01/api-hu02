  <!DOCTYPE html>
  <html lang="pt-BR">                         
  <head>                                                                                                                          
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">                                                                            
    <title>Comunidade HN</title>          
                                                                                                                                                                                           
    <!-- Meta Pixel -->                                                                                                                                                                    
    <script>                                                                                                                                                                               
    !function(f,b,e,v,n,t,s)                                                                                                                                                               
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?                                                                                                                                      
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};                                                                                                                              
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';                                                                                                                            
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];                                                                                                                                                
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');                                                                                                                                     
    fbq('init', 'SEU_PIXEL_ID');                                                                                                                                                         
    fbq('track', 'PageView');                                                                                                                                                              
                                                                                                                                                                                           
    const urlParams = new URLSearchParams(window.location.search);
    const fbclid = urlParams.get('fbclid') || null;                                                                                                                                        
    const utm_source = urlParams.get('utm_source') || null;                                                                                                                                
    const utm_campaign = urlParams.get('utm_campaign') || null;
    const utm_content = urlParams.get('utm_content') || null;                                                                                                                              
    const utm_medium = urlParams.get('utm_medium') || null;                                                                                                                                
   
    async function dispararLead() {                                                                                                                                                        
      const eventId = 'CompleteRegistration' + Date.now();                                                                                                                               
      const fbp = document.cookie.match(/_fbp=([^;]+)/)?.[1] || null;                                                                                                                      
      const fbc = document.cookie.match(/_fbc=([^;]+)/)?.[1] || null;                                                                                                                      
                                              
      fbq('track', 'CompleteRegistration', { currency: 'BRL', value: 0 }, { eventID: eventId });                                                                                           
                                                                                                                                                                                           
      await Promise.allSettled([                                                                                                                                                           
        fetch('https://jp-api-iv-server-production.up.railway.app/api/lead', {                                                                                                             
          method: 'POST',                                                                                                                                                                  
          headers: { 'Content-Type': 'application/json' },                                                                                                                                 
          body: JSON.stringify({ fbp, fbc, userAgent: navigator.userAgent, eventId })                                                                                                    
        }),                                                                                                                                                                                
        fetch('https://jp-api-iv-server-production.up.railway.app/api/kommo-lead', {                                                                                                     
          method: 'POST',                                                                                                                                                                  
          headers: { 'Content-Type': 'application/json' },                                                                                                                               
          body: JSON.stringify({ fbclid, fbp, fbc, pageUrl: window.location.href, utm_source, utm_campaign, utm_content, utm_medium })                                                     
        })                                                                                                                                                                                 
      ]);                                 
    }                                                                                                                                                                                      
    </script>                                                                                                                                                                              
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=SEU_PIXEL_ID&ev=PageView&noscript=1"/></noscript>
                                                                                                                                                                                           
    <link rel="preconnect" href="https://fonts.googleapis.com">                                                                                                                          
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
                                                                                                                                                                                           
    <style>                                                                                                                                                                                
      * { margin: 0; padding: 0; box-sizing: border-box; }                                                                                                                                 
                                                                                                                                                                                           
      body {                                                                                                                                                                             
        background-color: #000E01;                                                                                                                                                         
        min-height: 100vh;                                                                                                                                                               
        display: flex;                    
        flex-direction: column;
        align-items: center;                                                                                                                                                               
        justify-content: center;
        font-family: 'Inter', sans-serif;                                                                                                                                                  
        padding: 20px;                                                                                                                                                                   
      }                                   

      .card {                                                                                                                                                                              
        width: 100%;
        max-width: 420px;                                                                                                                                                                  
        background: #001301;                                                                                                                                                             
        border: 1px solid #02FF6B;            
        border-radius: 24px;              
        padding: 30px 30px 60px;
        display: flex;                                                                                                                                                                     
        flex-direction: column;               
        align-items: center;                                                                                                                                                               
        gap: 10px;                                                                                                                                                                       
      }                                                                                                                                                                                    
   
      .card img {                                                                                                                                                                          
        width: 90%;                                                                                                                                                                      
        max-width: 360px;
      }                                       
                                          
      .badge {
        display: flex;                                                                                                                                                                     
        align-items: center;
        gap: 8px;                                                                                                                                                                          
        background: rgba(255,255,255,0.05);                                                                                                                                              
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 999px;             
        padding: 6px 16px;
        font-size: 12px;                                                                                                                                                                   
        font-weight: 700;                 
        color: #fff;                                                                                                                                                                       
        letter-spacing: 1px;                                                                                                                                                               
        margin-bottom: 5px;
      }                                                                                                                                                                                    
                                                                                                                                                                                         
      .badge span { color: #aaa; font-weight: 400; }
                                                                                                                                                                                           
      h2.white {                              
        font-family: 'Bebas Neue', sans-serif;                                                                                                                                             
        font-size: 42px;                                                                                                                                                                 
        color: #fff;                                                                                                                                                                       
        text-align: center;                   
        letter-spacing: -0.5px;                                                                                                                                                            
        line-height: 1;                                                                                                                                                                  
      }                                                                                                                                                                                    
   
      h2.green {                                                                                                                                                                           
        font-family: 'Bebas Neue', sans-serif;                                                                                                                                           
        font-size: 50px;                      
        color: #00EC51;                   
        text-align: center;
        letter-spacing: 0.5px;                                                                                                                                                             
        line-height: 1;
      }                                                                                                                                                                                    
                                                                                                                                                                                         
      .subtitle {
        font-size: 14px;                                                                                                                                                                   
        color: #fff;
        text-align: center;                                                                                                                                                                
        margin-top: 5px;                                                                                                                                                                 
        line-height: 1.5;                     
      }                                   

      .btn {                                                                                                                                                                               
        display: block;
        width: 100%;                                                                                                                                                                       
        background: #00EC51;                                                                                                                                                             
        color: #000E01;                       
        text-align: center;               
        font-family: 'Inter', sans-serif;
        font-size: 16px;                                                                                                                                                                   
        font-weight: 700;                     
        letter-spacing: 0.5px;                                                                                                                                                             
        padding: 16px 24px;                                                                                                                                                              
        border-radius: 60px;                                                                                                                                                               
        text-decoration: none;
        margin-top: 10px;                                                                                                                                                                  
        box-shadow: 0 0 27px rgba(0, 236, 81, 0.5);                                                                                                                                      
      }                                       
                                                                                                                                                                                           
      footer {
        margin-top: 16px;                                                                                                                                                                  
        font-size: 11px;                                                                                                                                                                 
        color: #919191;                                                                                                                                                                    
        text-align: center;                                                                                                                                                              
        max-width: 420px;                     
      }                                   
    </style>
  </head>                                                                                                                                                                                  
  <body>
                                                                                                                                                                                           
    <div class="card">                                                                                                                                                                   
      <img src="https://grupogratuito.website/wp-content/uploads/2025/10/Jota_LP-WhatsApp-2.png" alt="">
                                              
      <div class="badge">COMUNIDADE GRATUITA <span>WHATSAPP</span></div>
                                          
      <h2 class="white">ACESSO LIBERADO A MINHA</h2>                                                                                                                                       
      <h2 class="green">COMUNIDADE GRATUITO</h2>                                                                                                                                           
                                                                                                                                                                                           
      <p class="subtitle"><strong>Entre</strong> e <strong>aguarde</strong>, as <strong>entradas</strong> serão enviada em <strong>instantes</strong>.</p>                                 
                                                                                                                                                                                         
      <a href="https://mais.red/run/hnr-comunidade" class="btn" onclick="dispararLead()">ENTRAR AGORA</a>                                                                                  
    </div>                                                                                                                                                                                 
                                                                                                                                                                                           
    <footer>                                                                                                                                                                               
      <strong>Proibido para menores de 18 anos. Jogue com responsabilidade.</strong><br>

    </footer>                                                                                                                                                                            
                                              
  </body>
