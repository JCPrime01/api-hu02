<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade HN - Oficial</title>

    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1290557609656779');
    fbq('track', 'PageView');

    function dispararLead() {
      const eventId = 'CompleteRegistration' + Date.now();
      fbq('track', 'CompleteRegistration', { currency: 'BRL', value: 0 }, { eventID: eventId });
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background-color: #000E01;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        padding: 10px;
        overflow: hidden;
      }

      .card {
        width: 100%;
        max-width: 360px;
        background: #001301;
        border: 1px solid #02FF6B;
        border-radius: 20px;
        padding: 15px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        position: relative;
      }

      .vagas-box {
        background: rgba(255, 255, 0, 0.1);
        border: 1px solid #FFFF00;
        border-radius: 8px;
        padding: 4px 12px;
        margin-bottom: 5px;
        animation: pulse-yellow 2s infinite;
      }

      .vagas-text { color: #fff; font-size: 11px; font-weight: 700; text-transform: uppercase; }
      #numero-vagas { color: #FFFF00; font-size: 15px; font-weight: bold; }

      @keyframes pulse-yellow {
        0% { box-shadow: 0 0 0px rgba(255, 255, 0, 0); }
        50% { box-shadow: 0 0 10px rgba(255, 255, 0, 0.3); }
        100% { box-shadow: 0 0 0px rgba(255, 255, 0, 0); }
      }

      .card img { width: 100%; max-width: 240px; height: auto; }

      h2.white {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        color: #fff;
        text-align: center;
        line-height: 1;
      }

      h2.green {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 30px;
        color: #00EC51;
        text-align: center;
        line-height: 1;
      }

      .subtitle {
        font-size: 12px;
        color: #fff;
        text-align: center;
        line-height: 1.3;
        margin: 5px 0;
      }

      .btn {
        display: block;
        width: 100%;
        background: #00EC51;
        color: #000E01;
        text-align: center;
        font-size: 15px;
        font-weight: 800;
        padding: 12px;
        border-radius: 50px;
        text-decoration: none;
        box-shadow: 0 0 20px rgba(0, 236, 81, 0.4);
      }

      /* NOTIFICAÇÃO CENTRALIZADA COM ANIMAÇÃO LATERAL */
      .toast {
        position: fixed;
        top: 25px;
        left: 50%;
        /* Começa escondido à esquerda e fora do centro */
        transform: translate(-150%, 0); 
        background: #001301;
        border: 1px solid #02FF6B;
        border-radius: 12px;
        padding: 10px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 9999;
        min-width: 260px;
        visibility: hidden;
        transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        box-shadow: 0 5px 25px rgba(0,0,0,0.8);
      }

      /* Estado visível: centralizado */
      .toast.show { 
        visibility: visible;
        transform: translate(-50%, 0); 
      }

      /* Estado de saída: vai para a direita */
      .toast.exit {
        transform: translate(150%, 0);
        opacity: 0;
      }

      .toast-icon { width: 10px; height: 10px; background: #02FF6B; border-radius: 50%; box-shadow: 0 0 10px #02FF6B; }
      .toast-text { color: #fff; font-size: 13px; white-space: nowrap; }
      .toast-text b { color: #FFFF00; }

      footer { margin-top: 15px; font-size: 10px; color: #555; text-align: center; }
    </style>
</head>
<body>

    <div id="notif-toast" class="toast">
        <div class="toast-icon"></div>
        <p class="toast-text"><b id="notif-nome">Marcos</b> acabou de entrar!</p>
    </div>

    <div class="card">
      <div class="vagas-box">
          <p class="vagas-text">Restam apenas <span id="numero-vagas">12</span> vagas</p>
      </div>

      <img src="https://grupogratuito.website/wp-content/uploads/2025/10/Jota_LP-WhatsApp-2.png" alt="Jogador Caro">
      
      <h2 class="white">ACESSO LIBERADO AO</h2>
      <h2 class="green">BILHETE DE ODD 100</h2>
      
      <p class="subtitle"><strong>Fale</strong> comigo <strong>AGORA</strong> para <strong>pegar</strong> o bilhete.</p>
      
      <a href="https://rp.redirecionar.online/" class="btn" onclick="dispararLead()">ENTRAR AGORA 🚀</a>
    </div>

    <footer>
      <strong>Proibido para menores de 18 anos.</strong><br>
      © 2025 – Jogador Caro
    </footer>

    <script>
      const nomes = ["Lucas", "Matheus", "Gabriel", "Felipe", "Rodrigo", "Rafael", "Bruno", "Daniel", "Gustavo", "Thiago", "Henrique", "Paulo", "Ariel", "Adriano", "Diogo", "Ricardo", "Ivan", "Luan", "João", "Pedro", "Vitor", "Caique", "Douglas", "Marcos"];

      function mostrarNotificacao() {
        const toast = document.getElementById('notif-toast');
        const nomeEl = document.getElementById('notif-nome');
        if (toast && nomeEl) {
            nomeEl.innerText = nomes[Math.floor(Math.random() * nomes.length)];
            
            // Limpa classes de ciclos anteriores
            toast.classList.remove('exit');
            toast.classList.add('show');

            // Depois de 3 segundos, inicia a saída pela direita
            setTimeout(() => {
              toast.classList.add('exit');
              toast.classList.remove('show');
            }, 3000);
        }
      }

      function iniciarFunil() {
        let contagem = 12;
        const display = document.getElementById('numero-vagas');
        
        const timerVagas = setInterval(() => {
          if (contagem > 2) {
            if (Math.random() > 0.3) {
              contagem--;
              if(display) display.innerText = contagem;
              setTimeout(mostrarNotificacao, 300); 
            }
          } else { clearInterval(timerVagas); }
        }, 4500); 

        setTimeout(() => {
            contagem--;
            if(display) display.innerText = contagem;
            mostrarNotificacao();
        }, 800);
      }
      window.onload = iniciarFunil;
    </script>
</body>
</html>
